spring:
  application:
    name: ticket-tracker
  datasource:
    url: jdbc:postgresql://localhost:5432/tickettracker
    username: 'postgres'
    password: '0000'
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  web:
    error:
      include-message: always